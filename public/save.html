<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Save ✿ Raia Photobooth</title>
<link rel="stylesheet" href="/style.css"/>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
</head>
<body>
<div class="app page-fade">
  <nav class="nav">
    <a class="brand" href="/welcome.html">
      <div class="brand-logo">📷</div>
      <div class="brand-name"><span>R</span><span>A</span><span>I</span><span>A</span><small>PHOTOBOOTH</small></div>
    </a>
    <button class="btn btn-ghost" onclick="RAIA.go('editor.html')">← Edit</button>
  </nav>
  <main class="container" style="padding-bottom:60px">
    <h2 class="page-title" style="font-size:32px">Selesai! ✿</h2>
    <p class="page-sub">Simpan hasil frame final, foto mentahan, atau export sebagai GIF.</p>

    <div class="save-grid">
      <div class="card" style="text-align:center">
        <h3 style="margin-bottom:10px;color:#5b3a29">Hasil Akhir</h3>
        <img id="finalImg" alt="Final" style="max-width:100%;border-radius:14px;box-shadow:0 14px 36px rgba(0,0,0,.18)"/>
        <canvas id="finalCanvas" style="display:none"></canvas>
        <div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;justify-content:center">
          <button class="btn btn-lg btn-primary" id="saveBtn">💾 SAVE PHOTO</button>
          <button class="btn btn-lg btn-blue" id="gifBtn">🎞 EXPORT GIF</button>
        </div>
      </div>
      <div class="card">
        <h3 style="margin-bottom:10px;color:#5b3a29">Foto Mentahan</h3>
        <div class="shots" id="shotsList"></div>
        <button class="btn" id="againBtn" style="margin-top:18px;width:100%">✿ Foto Lagi dari Awal</button>
      </div>
    </div>
  </main>
</div>
<script src="/app.js"></script>
<script>initSave();</script>
</body>
</html>
